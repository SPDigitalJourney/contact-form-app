<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lead Capture Form</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <div class="form-wrapper">
            <div class="form-header">
                <h1>Get in Touch</h1>
                <p>Tell us about your inquiry and we'll get back to you soon</p>
            </div>

            <form id="contactForm" class="contact-form">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" placeholder="Enter your full name" required>
                    <span class="error-message" id="nameError"></span>
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" placeholder="Enter your phone number" required>
                    <span class="error-message" id="phoneError"></span>
                </div>

                <div class="form-group">
                    <label for="purpose">Purpose of Contact</label>
                    <textarea id="purpose" name="purpose" placeholder="Tell us what you need help with..." rows="4" required></textarea>
                    <span class="error-message" id="purposeError"></span>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">
                    <span class="btn-text">Submit</span>
                    <span class="btn-loader" style="display: none;">Submitting...</span>
                </button>

                <div class="success-message" id="successMessage" style="display: none;">
                    ✓ Thank you! Your lead has been submitted successfully.
                </div>

                <div class="error-global" id="globalError" style="display: none;">
                </div>
            </form>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
